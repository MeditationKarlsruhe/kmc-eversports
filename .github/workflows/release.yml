name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches plugin Version header
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PLUGIN_VERSION=$(grep -oP '(?<=Version:\s)[0-9][0-9A-Za-z.\-]*' kmc-eversports.php)
          if [ "$TAG_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match Version header in kmc-eversports.php ($PLUGIN_VERSION)"
            exit 1
          fi

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - run: composer install --no-dev --no-interaction --no-progress --optimize-autoloader

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Assemble plugin directory
        run: |
          mkdir -p dist/kmc-eversports
          cp -r src vendor build templates assets kmc-eversports.php block.json dist/kmc-eversports/

      - name: Build ZIP
        working-directory: dist
        run: zip -r ../kmc-eversports.zip kmc-eversports

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: kmc-eversports.zip
          generate_release_notes: true
